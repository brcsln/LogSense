<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LogSense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #142447 0%, #080d18 48%, #05070d 100%);
            color: #f3f6ff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .page-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .upload-card {
            width: 100%;
            max-width: 700px;
            background: rgba(14,22,38,.95);
            border-radius: 24px;
            border: 1px solid rgba(79,140,255,.25);
            box-shadow: 0 25px 60px rgba(0,0,0,.45);
            padding: 45px;
        }

        .brand-star{
            color:#4f8cff;
            font-size:55px;
        }

        .brand-title{
            font-size:42px;
            font-weight:bold;
            margin-top:8px;
        }

        .brand-subtitle{
            color:#aebbd2;
            margin-bottom:35px;
        }

        .upload-area{
            background:#0b1322;
            border:1px dashed #4f8cff;
            border-radius:18px;
            padding:35px;
        }

        .custom-file-upload{
            display:flex;
            align-items:center;
            gap:15px;
            background:#101a2c;
            border:1px solid #2b3b58;
            border-radius:12px;
            padding:12px;
            margin-bottom:25px;
        }

        .file-button{
            background:#397be8;
            color:white;
            padding:10px 18px;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
            margin:0;
            transition:.25s;
        }

        .file-button:hover{
            background:#4f8cff;
        }

        .file-name{
            color:#aebbd2;
            overflow:hidden;
            text-overflow:ellipsis;
            white-space:nowrap;
        }

        .btn-primary{
            width:100%;
            padding:13px;
            border:none;
            border-radius:12px;
            background:#397be8;
            font-weight:bold;
        }

        .btn-primary:hover{
            background:#4f8cff;
        }

        .privacy-note{
            color:#8d99ae;
            margin-top:25px;
            font-size:14px;
        }

        .error-box{
            background:#551b1b;
            color:#ffd2d2;
            border-radius:10px;
            padding:15px;
            margin-bottom:25px;
        }
    </style>

</head>

<body>

<div class="page-container">

    <div class="upload-card text-center">

        <div class="brand-star">✦</div>

        <div class="brand-title">
            LogSense
        </div>

        <div class="brand-subtitle">
            Understand the Story Behind Incidents
        </div>

        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        <div class="upload-area">

            <h4 class="mb-3">
                Upload Production Log
            </h4>

            <p class="text-secondary mb-4">
                Select a <strong>.log</strong> or <strong>.txt</strong> file to begin your investigation.
            </p>

            <form action="/upload" method="post" enctype="multipart/form-data">

                <div class="custom-file-upload">

                    <input
                        type="file"
                        id="log_file"
                        name="log_file"
                        accept=".log,.txt"
                        hidden
                        required>

                    <label class="file-button" for="log_file">
                        Choose Log File
                    </label>

                    <span id="file-name" class="file-name">
                        No file selected
                    </span>

                </div>

                <button class="btn btn-primary" type="submit">
                    Analyze Incident
                </button>

            </form>

        </div>

        <div class="privacy-note">
            Fast • Secure • Local Analysis
        </div>

    </div>

</div>

<script>

const fileInput = document.getElementById("log_file");
const fileName = document.getElementById("file-name");

fileInput.addEventListener("change", function(){

    if(fileInput.files.length > 0){

        fileName.textContent = fileInput.files[0].name;

    }else{

        fileName.textContent = "No file selected";

    }

});

</script>

</body>

</html>
