<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LogSense</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, #142447 0%, #080d18 48%, #05070d 100%);
            color: #f3f6ff;
        }

        .page-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .upload-card {
            width: 100%;
            max-width: 680px;
            padding: 48px;
            background: rgba(14, 22, 38, 0.94);
            border: 1px solid rgba(82, 145, 255, 0.25);
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
        }

        .brand-star {
            color: #4f8cff;
            font-size: 48px;
            line-height: 1;
        }

        .brand-title {
            margin-top: 12px;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .brand-subtitle {
            color: #aebbd2;
            font-size: 18px;
        }

        .upload-area {
            margin-top: 36px;
            padding: 34px 24px;
            background: #0b1322;
            border: 1px dashed #4f8cff;
            border-radius: 18px;
        }

        .form-control {
            color: #dfe7f6;
            background-color: #101a2c;
            border-color: #2b3b58;
        }

        .form-control::file-selector-button {
            color: #ffffff;
            background-color: #244a86;
            border: 0;
        }

        .form-control:focus {
            color: #ffffff;
            background-color: #101a2c;
            border-color: #4f8cff;
            box-shadow: 0 0 0 0.25rem rgba(79, 140, 255, 0.18);
        }

        .btn-primary {
            padding: 13px 24px;
            background: #397be8;
            border: 0;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #4f8cff;
        }

        .privacy-note {
            color: #8190aa;
            font-size: 14px;
        }

        .error-message {
            margin-top: 20px;
            padding: 14px 16px;
            color: #ffb7b7;
            background: rgba(170, 42, 42, 0.18);
            border: 1px solid rgba(255, 99, 99, 0.35);
            border-radius: 12px;
        }

        @media (max-width: 576px) {
            .upload-card {
                padding: 32px 22px;
            }

            .brand-title {
                font-size: 34px;
            }
        }
    </style>
</head>

<body>

    <main class="page-container">
        <section class="upload-card text-center">

            <div class="brand-star">✦</div>

            <h1 class="brand-title">LogSense</h1>

            <p class="brand-subtitle">
                Understand the story behind incidents.
            </p>

            {% if error %}
                <div class="error-message">
                    {{ error }}
                </div>
            {% endif %}

            <div class="upload-area">

                <h2 class="h5 mb-2">Upload a production log</h2>

                <p class="text-secondary mb-4">
                    Select a structured <code>.log</code> or <code>.txt</code> file.
                </p>

                <form
                    action="/upload"
                    method="post"
                    enctype="multipart/form-data"
                >
                    <input
                        class="form-control mb-4"
                        id="log_file"
                        name="log_file"
                        type="file"
                        accept=".log,.txt"
                        required
                    >

                    <button class="btn btn-primary w-100" type="submit">
                        Analyze Incident
                    </button>
                </form>
            </div>

            <p class="privacy-note mt-4 mb-0">
                Fast · Focused · Local analysis
            </p>

        </section>
    </main>

</body>
</html>
